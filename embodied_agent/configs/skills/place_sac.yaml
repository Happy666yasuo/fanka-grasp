algo: sac
skill: place
seed: 7
total_timesteps: 30000
output_root: outputs
policy: MlpPolicy

expert_episodes: 100
expert_noise_std: 0.05

env:
  object_name: red_block
  zone_name: green_zone
  max_steps: 20
  action_scale: 0.04
  action_repeat: 60
  randomize: true
  seed: 7
  use_staging: true

algo_kwargs:
  learning_rate: 0.0003
  buffer_size: 100000
  learning_starts: 1000
  batch_size: 256
  gamma: 0.99
  tau: 0.005
  train_freq: 1
  gradient_steps: 1
  ent_coef: auto
  policy_kwargs:
    net_arch:
      - 128
      - 128

eval:
  episodes: 10
  eval_freq: 1000